# !planetiler-charites-ai style-layer
# File name of this style:
#   - admin.yml
# Schema layer: admin
# Reads attributes:
#   - admin_level
# Instructions:
#   - grey dashed boundary for everything EXCEPT ward edges (admin_level 7)
#   - admin_level 7 is rendered in blue by admin-l7.yml (line-dasharray
#     cannot be data-driven, so we split into two layers)
id: admin
type: line
source: taito
source-layer: admin
filter: ["!=", ["get", "admin_level"], "7"]
paint:
  line-color: "#9a8e7a"
  line-dasharray: [3, 2]
  line-width:
    - interpolate
    - ["linear"]
    - ["zoom"]
    - 10
    - ["match", ["get", "admin_level"], "4", 1.5, "6", 1, "8", 0.6, 0.4]
    - 14
    - ["match", ["get", "admin_level"], "4", 2.5, "6", 1.8, "8", 1.1, 0.8]
