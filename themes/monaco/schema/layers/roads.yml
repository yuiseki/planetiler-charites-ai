# !planetiler-charites-ai schema-layer
# Layer ID: roads
# Geometry: line
# Sources: osm
# Attributes:
#   - class: motorway | trunk | primary | secondary | tertiary | minor | service | path
#   - name: osm "name" tag (used by future label layer)
# Style consumers:
#   - style/layers/roads-casing.yml  (dark outline)
#   - style/layers/roads-fill.yml    (light inner stroke)
# Instructions:
#   - osm highways, classified
#   - one schema layer drives casing + fill in style (1:N example)
- id: roads
  features:
    - source: osm
      geometry: line
      include_when:
        highway:
          - motorway
          - motorway_link
          - trunk
          - trunk_link
          - primary
          - primary_link
          - secondary
          - secondary_link
          - tertiary
          - tertiary_link
          - residential
          - unclassified
          - living_street
          - service
          - pedestrian
          - footway
          - path
          - cycleway
          - track
          - steps
      min_zoom: 11
      min_size: 0
      attributes:
        - key: class
          type: string
          value:
            match:
              - value: motorway
                if: { highway: [motorway, motorway_link] }
              - value: trunk
                if: { highway: [trunk, trunk_link] }
              - value: primary
                if: { highway: [primary, primary_link] }
              - value: secondary
                if: { highway: [secondary, secondary_link] }
              - value: tertiary
                if: { highway: [tertiary, tertiary_link] }
              - value: minor
                if: { highway: [residential, unclassified, living_street] }
              - value: service
                if: { highway: service }
              - else: path
        - key: name
          value: '${ feature.tags.name }'
