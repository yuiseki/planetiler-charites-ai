# !planetiler-charites-ai schema-layer
# Layer ID: stations
# Geometry: point
# Sources: osm
# Attributes:
#   - name
#   - class: station | halt | tram_stop | subway_entrance | stop_position
# Style consumers:
#   - style/layers/stations.yml
# Instructions:
#   - 駅を表示
#   - train stations
#   - 鉄道駅・地下鉄駅
- id: stations
  features:
    - source: osm
      geometry: point
      include_when:
        railway:
          - station
          - halt
          - tram_stop
          - subway_entrance
          - stop
        public_transport:
          - station
          - stop_position
      min_zoom: 10
      min_size: 0
      attributes:
        - key: name
          value: '${ feature.tags.name }'
        - key: class
          value: '${ coalesce(feature.tags.railway, feature.tags.public_transport) }'
